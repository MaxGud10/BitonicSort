name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Debug
            compiler: gcc
          - os: ubuntu-latest
            build_type: Release
            compiler: gcc
          - os: ubuntu-latest
            build_type: Debug
            compiler: clang
          - os: ubuntu-latest
            build_type: Release
            compiler: clang

          - os: windows-latest
            build_type: Debug
            compiler: msvc
          - os: windows-latest
            build_type: Release
            compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake \
            gcc g++ clang \
            ocl-icd-opencl-dev pocl-opencl-icd \
            clinfo

      - name: Show OpenCL platforms (Linux)
        if: runner.os == 'Linux'
        run: |
          clinfo || true

      - name: Configure compiler env (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          fi

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja cmake

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenCL runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y opencl-intel-cpu-runtime

      - name: Setup vcpkg + install OpenCL ICD loader (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:GITHUB_WORKSPACE\vcpkg
          & $env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat
          & $env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe install opencl --triplet x64-windows

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: fetchcontent-${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt', 'unit_tests/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.compiler }}-
            fetchcontent-${{ runner.os }}-

      - name: CMake configure (${{ matrix.build_type }})
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_C_COMPILER=${{ env.CC }} \
              -DCMAKE_CXX_COMPILER=${{ env.CXX }}
          else
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          fi

      - name: Build
        run: |
          cmake --build build

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure